name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Shadow21AR
          svg_path: output/snake.svg
          _color: "c9a227"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snake-svg
          path: output/

      - name: Debug output
        run: |
          ls -la output/ || echo "No output directory"
          cat output/*.svg || echo "No SVG file"
