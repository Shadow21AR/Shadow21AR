name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SVG
        run: |
          mkdir -p output
          npx --yes platane/snk --github-username Shadow21AR --svg-output output/github-contribution-grid-snake.svg --color c9a227

      - name: Push to branch
        if: success()
        run: |
          cd output
          git init
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update snake animation [skip ci]"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Shadow21AR/Shadow21AR.git HEAD:gh-pages || true
