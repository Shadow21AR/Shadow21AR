name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: Platane/snk@v3
        with:
          github_user_name: Shadow21AR
          svg_path: output/github-contribution-grid-snake.svg
          _color: "c9a227"

      - name: Push to branch
        run: |
          mkdir -p output
          git init output
          cd output
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Shadow21AR/Shadow21AR.git
          git add .
          git commit -m "Update snake animation"
          git push -f origin HEAD:gh-pages
