name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Shadow21AR
          svg_path: github-snake.svg
          _color: c9a227

      - name: Setup git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Create branch and push
        run: |
          git checkout --orphan gh-pages
          rm -rf *
          mv github-snake.svg index.svg
          git add .
          git commit -m "Snake animation"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Shadow21AR/Shadow21AR.git gh-pages
